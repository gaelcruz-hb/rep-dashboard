command:
  - sh
  - -c
  - "cd server && npm install && node server.js"
env:
  - name: DATABRICKS_HOST
    value: "<your-databricks-workspace-host>"
  - name: DATABRICKS_HTTP_PATH
    value: "<your-sql-warehouse-http-path>"
  # DATABRICKS_TOKEN is injected automatically by Databricks Apps at runtime
