command:
  - sh
  - -c
  - "cd server && npm install && node server.js"
env:
  - name: DATABRICKS_HOST
    value: "homebase-staging.cloud.databricks.com"
  - name: DATABRICKS_HTTP_PATH
    value: "/sql/1.0/warehouses/16984dfe9a2c3705"
  - name: HOME
    value: "/tmp"
  # DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET auto-injected at runtime by Databricks Apps
resources:
  - name: "sql-warehouse"
    description: "SQL Warehouse for rep dashboard queries"
    sql_warehouse:
      id: "16984dfe9a2c3705"
      permission: "CAN_USE"
